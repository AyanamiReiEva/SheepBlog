# AI开发流水线基础配置
version: "1.0"

pipeline:
  name: "AI Dev Pipeline"
  identifier: "ai_dev_pipeline"
  projectIdentifier: "myblog"
  orgIdentifier: "default"
  tags: {}
  stages:
    - stage:
        name: "需求分析"
        identifier: "requirements_analysis"
        description: "分析用户需求，生成结构化需求文档"
        type: "Custom"
        spec:
          execution:
            steps:
              - step:
                  type: "Run"
                  name: "分析需求"
                  identifier: "analyze_requirement"
                  spec:
                    shell: "Bash"
                    command: |
                      echo "=== 需求分析阶段 ==="
                      echo "输入需求: ${INPUT_REQUIREMENT}"
                      echo "任务ID: ${TASK_ID}"
                      echo "需求分析完成"
                    envVariables:
                      INPUT_REQUIREMENT: "<+input>"
                      TASK_ID: "<+pipeline.sequenceId>"
                    timeout: "10m"
    - stage:
        name: "代码开发"
        identifier: "code_development"
        description: "多智能体协同开发代码"
        type: "Custom"
        spec:
          execution:
            steps:
              - step:
                  type: "Run"
                  name: "生成代码"
                  identifier: "generate_code"
                  spec:
                    shell: "Bash"
                    command: |
                      echo "=== 代码开发阶段 ==="
                      echo "生成代码中..."
                      echo "代码生成完成"
                    timeout: "30m"
              - step:
                  type: "Run"
                  name: "代码评审"
                  identifier: "code_review"
                  spec:
                    shell: "Bash"
                    command: |
                      echo "=== 代码评审阶段 ==="
                      echo "架构师评审中..."
                      echo "代码评审完成"
                    timeout: "15m"
    - stage:
        name: "测试"
        identifier: "testing"
        description: "自动生成和运行测试"
        type: "Custom"
        spec:
          execution:
            steps:
              - step:
                  type: "Run"
                  name: "生成测试"
                  identifier: "generate_tests"
                  spec:
                    shell: "Bash"
                    command: |
                      echo "=== 测试生成阶段 ==="
                      echo "生成测试用例..."
                      echo "测试生成完成"
                    timeout: "20m"
              - step:
                  type: "Run"
                  name: "运行测试"
                  identifier: "run_tests"
                  spec:
                    shell: "Bash"
                    command: |
                      echo "=== 测试执行阶段 ==="
                      npm run lint
                      echo "ESLint检查通过"
                      if [ -f "package.json" ] && grep -q "test" package.json; then
                        npm run test 2>/dev/null || echo "测试脚本未配置或运行失败，继续执行"
                      else
                        echo "未找到测试脚本，跳过"
                      fi
                    timeout: "15m"
    - stage:
        name: "合规校验"
        identifier: "compliance"
        description: "代码质量和安全扫描"
        type: "Custom"
        spec:
          execution:
            steps:
              - step:
                  type: "Run"
                  name: "代码规范检查"
                  identifier: "code_lint"
                  spec:
                    shell: "Bash"
                    command: |
                      echo "=== 代码规范检查 ==="
                      npm run lint:fix
                      npm run format
                      echo "代码规范检查完成"
                    timeout: "10m"
              - step:
                  type: "Run"
                  name: "构建验证"
                  identifier: "build_verify"
                  spec:
                    shell: "Bash"
                    command: |
                      echo "=== 构建验证 ==="
                      npm run build
                      echo "构建验证通过"
                    timeout: "20m"
    - stage:
        name: "部署"
        identifier: "deployment"
        description: "自动部署到生产环境"
        type: "Custom"
        spec:
          execution:
            steps:
              - step:
                  type: "Run"
                  name: "准备部署"
                  identifier: "prepare_deploy"
                  spec:
                    shell: "Bash"
                    command: |
                      echo "=== 部署准备 ==="
                      echo "部署就绪"
                    timeout: "5m"
              - step:
                  type: "Run"
                  name: "执行部署"
                  identifier: "execute_deploy"
                  spec:
                    shell: "Bash"
                    command: |
                      echo "=== 执行部署 ==="
                      echo "部署完成"
                    timeout: "15m"

  failureStrategies:
    - onFailure:
        errors:
          - "AllErrors"
        action:
          type: "StageRollback"
